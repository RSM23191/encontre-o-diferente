<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Encontre o Diferente</title>

<link
rel="stylesheet"
href="css/styles.css">

</head>

<body>

<header>

<h1>🔍Encontre o Diferente</h1>

<p>
Encontre a fruta diferente.
</p>

</header>

<main>

<section id="inicio">

<label for="nomeJogador">

Digite seu nome:

</label>

<input
type="text"
id="nomeJogador"
placeholder="Seu nome">

<button id="btnJogar">

Jogar

</button>

</section>

<section id="painel">

<p>
Jogador:
<span id="nomeExibido">---</span>
</p>

<p>
Pontos:
<span id="pontuacao">0</span>
</p>

<p>
Tempo:
<span id="tempo">45</span>
</p>

<p>
Rodada:
<span id="rodada">1</span>
</p>

</section>

<section>

<div id="tabuleiro">

</div>

</section>

<section id="resultado">

<h2>Fim de jogo</h2>

<p id="mensagemFinal">

</p>

<button id="btnReiniciar">

Jogar novamente

</button>

</section>

</main>

<script src="js/script.js"></script>

</body>

</html>
