<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Encontre o Diferente</title>

<link rel="stylesheet"
href="css/styles.css">

</head>

<body>

<div class="container">

<header>

<h1>
🔎 Encontre o Diferente
</h1>

<p class="subtitulo">
Encontre a fruta diferente antes do tempo acabar.
</p>

</header>


<section class="area-jogador">

<label for="nomeJogador">

Digite seu nome:

</label>

<input
id="nomeJogador"
type="text"
placeholder="Seu nome">

<button id="btnJogar">

Jogar

</button>

</section>


<section class="painel">

<div>

👤 Jogador:
<span id="nomeExibido">

---

</span>

</div>


<div>

⭐ Pontos:
<span id="pontuacao">

0

</span>

</div>


<div>

⏱️ Tempo:
<span id="tempo">

45

</span>

</div>


<div>

🏆 Rodada:
<span id="rodada">

1

</span>

</div>

</section>


<section id="tabuleiro">

</section>


<section class="mensagem">

<div id="resultado">

</div>

</section>


<button
id="btnReiniciar"
style="display:none">

Jogar novamente

</button>

</div>


<script src="js/script.js">

</script>

</body>

</html>
